short_bio: |
  <p>
    I'm currently a senior undergraduate student at
    <a href="https://www.shanghaitech.edu.cn/eng/" target="_blank">ShanghaiTech University</a>,
    majoring in Materials Science and Engineering, minoring in EECS,
    and was an exchange student at
    <a href="https://illinois.edu/" target="_blank">UIUC</a>,
    majoring in Electrical and Computer Engineering.
  </p>

  <p>
    My research interests include bioelectronics, wearable medical devices, flexible electronics, and AI-enabled biomedical devices.
    My research journey began at ShanghaiTech University,
    where I was advised by
    <a href="https://xiong-group.com/" target="_blank">Prof. Ze Xiong</a>.
    I also had the opportunity to work with
    <a href="https://linhaisong.lab.westlake.edu.cn/" target="_blank">Prof. Haisong Lin</a>
    at  <a href="https://www.shanghaitech.edu.cn/eng/" target="_blank">Westlake University</a>.
    I am especially interested in developing low-cost, high-resolution, and customizable biomedical systems for human-machine interaction and healthcare applications.
  </p>
